version: "3.9"

services:
  backend:
    build: ./backend
    container_name: flask_app
    ports:
      - "5000:5000"

  frontend:
    build:
      context: ./GenreSort
      args:
        VITE_API_URL: http://backend:5000
    container_name: vite_react_app
    ports:
      - "3000:80"
    depends_on:
      - backend
